<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ten" />
  <title>Ten</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #4a9eff;
      --accent-dim: #1a3a5c;
      --green: #4caf7d;
      --radius: 12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    body {
      display: flex;
      flex-direction: column;
      max-width: 560px;
      margin: 0 auto;
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    #date-label {
      font-size: 13px;
      color: var(--muted);
    }

    /* Progress dots */
    #dots {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s;
      cursor: pointer;
    }
    .dot.active { background: var(--accent); }
    .dot.seen   { background: var(--green); }

    /* Card */
    #card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    .word-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #word {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1px;
      flex: 1;
    }

    #speak-btn {
      background: var(--accent-dim);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 20px;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    #speak-btn:active { transform: scale(0.92); }
    #speak-btn.speaking { background: var(--accent); color: #fff; }

    #translation {
      font-size: 15px;
      color: var(--muted);
      font-style: italic;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
    }

    .sentences-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .sentence {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sentence-pt {
      font-size: 15px;
      line-height: 1.55;
    }

    .sentence-en {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }

    /* Nav */
    nav {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-shrink: 0;
      padding-bottom: 8px;
    }

    nav button {
      flex: 1;
      padding: 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    nav button:hover { background: var(--border); }
    nav button:disabled { opacity: 0.3; cursor: default; }

    #next-btn {
      background: var(--accent-dim);
      border-color: var(--accent-dim);
      color: var(--accent);
    }
    #next-btn:hover { background: #1e4a7a; }

    #counter {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      flex-shrink: 0;
    }

    #pool-info {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      flex-shrink: 0;
      opacity: 0.6;
    }
    #pool-info.warning { color: #e5a84e; opacity: 1; }

    #loading, #error {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 15px;
      color: var(--muted);
    }
    #error { color: #e06c75; }
    #app { display: none; flex-direction: column; height: 100%; }
    body.ready #loading { display: none; }
    body.ready #app { display: flex; }
  </style>
</head>
<body>
  <div id="loading">Loading…</div>
  <div id="error" style="display:none"></div>

  <div id="app">
    <header>
      <h1>Ten</h1>
      <span id="date-label"></span>
    </header>

    <div id="dots"></div>

    <div id="card">
      <div class="word-row">
        <span id="word"></span>
        <button id="speak-btn" title="Hear pronunciation">🔊</button>
      </div>
      <p id="translation"></p>
      <hr class="divider" />
      <span class="sentences-label">In use</span>
      <div class="sentence">
        <span class="sentence-pt" id="s1-pt"></span>
        <span class="sentence-en" id="s1-en"></span>
      </div>
      <div class="sentence">
        <span class="sentence-pt" id="s2-pt"></span>
        <span class="sentence-en" id="s2-en"></span>
      </div>
    </div>

    <nav>
      <button id="prev-btn">← Prev</button>
      <button id="next-btn">Next →</button>
    </nav>
    <p id="counter"></p>
    <p id="pool-info"></p>
  </div>

  <script>
    const WORDS_PER_DAY = 10;

    function dateKey() {
      const d = new Date();
      return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    }

    // Deterministic daily seed from date string
    function hashDate(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = Math.imul(31, h) + str.charCodeAt(i) | 0;
      }
      return Math.abs(h);
    }

    // Seeded shuffle (Fisher-Yates with LCG)
    function seededShuffle(arr, seed) {
      const a = [...arr];
      let s = seed;
      const next = () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0x100000000; };
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(next() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    async function init() {
      let words;
      try {
        const res = await fetch('/words.json');
        words = await res.json();
      } catch (e) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').textContent = 'Failed to load words.json';
        document.getElementById('error').style.display = 'flex';
        return;
      }

      const key = dateKey();
      const seed = hashDate(key);
      const shuffled = seededShuffle(words, seed);
      const todayWords = shuffled.slice(0, WORDS_PER_DAY);

      // Format date label
      const now = new Date();
      document.getElementById('date-label').textContent =
        now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

      let current = 0;
      const seen = new Set();

      // Build dots
      const dotsEl = document.getElementById('dots');
      const dots = todayWords.map((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot';
        d.addEventListener('click', () => goto(i));
        dotsEl.appendChild(d);
        return d;
      });

      function updateDots() {
        dots.forEach((d, i) => {
          d.className = 'dot' + (i === current ? ' active' : seen.has(i) ? ' seen' : '');
        });
      }

      function render(i) {
        const w = todayWords[i];
        document.getElementById('word').textContent = w.word;
        document.getElementById('translation').textContent = w.translation;
        document.getElementById('s1-pt').textContent = w.sentences[0]?.pt ?? '';
        document.getElementById('s1-en').textContent = w.sentences[0]?.en ?? '';
        document.getElementById('s2-pt').textContent = w.sentences[1]?.pt ?? '';
        document.getElementById('s2-en').textContent = w.sentences[1]?.en ?? '';
        document.getElementById('counter').textContent = `${i + 1} / ${todayWords.length}`;
        document.getElementById('prev-btn').disabled = i === 0;
        document.getElementById('next-btn').disabled = i === todayWords.length - 1;
        seen.add(i);
        updateDots();
      }

      function goto(i) {
        current = i;
        render(i);
        window.speechSynthesis?.cancel();
        document.getElementById('speak-btn').classList.remove('speaking');
      }

      document.getElementById('prev-btn').addEventListener('click', () => {
        if (current > 0) goto(current - 1);
      });
      document.getElementById('next-btn').addEventListener('click', () => {
        if (current < todayWords.length - 1) goto(current + 1);
      });

      // Keyboard nav
      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goto(Math.min(current + 1, todayWords.length - 1));
        if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goto(Math.max(current - 1, 0));
        if (e.key === ' ' || e.key === 'Enter') speak();
      });

      // Speech
      function speak() {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const btn = document.getElementById('speak-btn');
        const utt = new SpeechSynthesisUtterance(todayWords[current].word);
        utt.lang = 'pt-BR';
        utt.rate = 0.85;
        utt.onstart = () => btn.classList.add('speaking');
        utt.onend = utt.onerror = () => btn.classList.remove('speaking');
        window.speechSynthesis.speak(utt);
      }

      document.getElementById('speak-btn').addEventListener('click', speak);

      // Go
      render(0);
      document.body.classList.add('ready');

      // Pool health indicator
      const totalDays = Math.floor(words.length / WORDS_PER_DAY);
      const poolInfo = document.getElementById('pool-info');
      poolInfo.textContent = `~${totalDays} day${totalDays !== 1 ? 's' : ''} left in pool`;
      if (totalDays <= 7) poolInfo.classList.add('warning');

      // Register service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      }
    }

    init();
  </script>
</body>
</html>
